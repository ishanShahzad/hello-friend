<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" width="240" height="50">
  <defs>
    <linearGradient id="rozareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#E94B7C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="petalCoral" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8A8A;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="petalMagenta" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F062A0;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#E94B7C;stop-opacity:0.85" />
    </linearGradient>
    <linearGradient id="petalPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.85" />
    </linearGradient>
  </defs>

  <!-- Diamond bloom mark -->
  <g transform="translate(4, 4)">
    <!-- Top petal (coral) -->
    <path d="M21 2 C29 8 30 16 21 22 C12 16 13 8 21 2 Z" fill="url(#petalCoral)"/>
    <!-- Right petal (magenta) -->
    <path d="M40 21 C34 29 26 30 20 21 C26 12 34 13 40 21 Z" fill="url(#petalMagenta)"/>
    <!-- Bottom petal (purple) -->
    <path d="M21 40 C13 34 12 26 21 20 C30 26 29 34 21 40 Z" fill="url(#petalPurple)"/>
    <!-- Left petal (magenta blend) -->
    <path d="M2 21 C8 13 16 12 22 21 C16 30 8 29 2 21 Z" fill="url(#petalMagenta)" opacity="0.85"/>
    <!-- Center R -->
    <circle cx="21" cy="21" r="6" fill="white" opacity="0.95"/>
    <text x="21" y="25.5" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="9" font-weight="900" fill="url(#rozareGrad)" text-anchor="middle" letter-spacing="-0.3">R</text>
  </g>

  <!-- Brand text -->
  <text x="56" y="33" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" font-weight="800" letter-spacing="-0.8" fill="url(#rozareGrad)">
    Rozare
  </text>
</svg>
