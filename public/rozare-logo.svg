<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 56" width="220" height="56">
  <defs>
    <linearGradient id="rzGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6"/>
      <stop offset="50%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="rzGradSoft" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#14B8A6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.18"/>
    </linearGradient>
  </defs>

  <!-- Mark: rotated square "gem" with negative-space R cut by an orbital arc -->
  <g transform="translate(4,4)">
    <!-- Soft glow tile -->
    <rect x="2" y="2" width="44" height="44" rx="12" fill="url(#rzGradSoft)"/>
    <!-- Primary gem tile -->
    <rect x="4" y="4" width="40" height="40" rx="11" fill="url(#rzGrad)"/>
    <!-- Orbital arc accent -->
    <path d="M40 14 a16 16 0 0 1 -26 22" fill="none" stroke="white" stroke-opacity="0.35" stroke-width="1.6" stroke-linecap="round"/>
    <!-- Negative-space monogram R -->
    <path d="M17 14 h11 a7 7 0 0 1 0 14 h-7 l9 6 M21 28 v6 M21 14 v20"
          fill="none" stroke="white" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Spark dot -->
    <circle cx="36" cy="14" r="2" fill="white"/>
  </g>

  <!-- Wordmark -->
  <text x="62" y="37" font-family="Orbitron, 'Montserrat', system-ui, sans-serif"
        font-size="26" font-weight="700" letter-spacing="1.2" fill="url(#rzGrad)">Rozare</text>
</svg>
