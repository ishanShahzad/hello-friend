<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 50" width="240" height="50">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="petalGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="petalGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shieldGrad" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0.35" />
    </linearGradient>
  </defs>

  <!-- Logo icon centered in 44x44 area, offset by 3,3 -->
  <g transform="translate(25, 25)">
    <!-- Shield background -->
    <path d="M0 -20 L17.3 -10 L17.3 8 L0 20 L-17.3 8 L-17.3 -10 Z" fill="url(#shieldGrad)" stroke="url(#logoGrad)" stroke-width="1.2" opacity="0.5"/>
    
    <!-- Outer petals layer 1 - 5 petals -->
    <g opacity="0.45">
      <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petalGrad1)" transform="rotate(0)"/>
      <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petalGrad2)" transform="rotate(72)"/>
      <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petalGrad1)" transform="rotate(144)"/>
      <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petalGrad2)" transform="rotate(216)"/>
      <ellipse cx="0" cy="-10" rx="5.5" ry="10" fill="url(#petalGrad1)" transform="rotate(288)"/>
    </g>
    
    <!-- Middle petals layer 2 - rotated -->
    <g opacity="0.7">
      <ellipse cx="0" cy="-7.5" rx="4.2" ry="7.5" fill="url(#petalGrad2)" transform="rotate(36)"/>
      <ellipse cx="0" cy="-7.5" rx="4.2" ry="7.5" fill="url(#petalGrad1)" transform="rotate(108)"/>
      <ellipse cx="0" cy="-7.5" rx="4.2" ry="7.5" fill="url(#petalGrad2)" transform="rotate(180)"/>
      <ellipse cx="0" cy="-7.5" rx="4.2" ry="7.5" fill="url(#petalGrad1)" transform="rotate(252)"/>
      <ellipse cx="0" cy="-7.5" rx="4.2" ry="7.5" fill="url(#petalGrad2)" transform="rotate(324)"/>
    </g>
    
    <!-- Inner petals layer 3 -->
    <g opacity="0.9">
      <ellipse cx="0" cy="-5" rx="3" ry="5.5" fill="url(#logoGrad)" transform="rotate(18)"/>
      <ellipse cx="0" cy="-5" rx="3" ry="5.5" fill="url(#logoGrad)" transform="rotate(90)"/>
      <ellipse cx="0" cy="-5" rx="3" ry="5.5" fill="url(#logoGrad)" transform="rotate(162)"/>
      <ellipse cx="0" cy="-5" rx="3" ry="5.5" fill="url(#logoGrad)" transform="rotate(234)"/>
      <ellipse cx="0" cy="-5" rx="3" ry="5.5" fill="url(#logoGrad)" transform="rotate(306)"/>
    </g>
    
    <!-- Core bloom -->
    <circle cx="0" cy="0" r="4" fill="url(#logoGrad)" opacity="0.95"/>
    <circle cx="0" cy="0" r="2.5" fill="white" opacity="0.35"/>
    <circle cx="-0.8" cy="-0.8" r="1.2" fill="white" opacity="0.5"/>
  </g>

  <!-- Brand text -->
  <text x="54" y="32" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="24" font-weight="800" letter-spacing="-0.5" fill="url(#logoGrad)">
    Tortrose
  </text>
</svg>