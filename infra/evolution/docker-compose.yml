# Evolution API v2 — Production docker-compose.yml for Oracle Cloud
#
# Deploy on Oracle Cloud Ubuntu VM at /home/ubuntu/evolution-api/docker-compose.yml
# All secrets / tunables live in the sibling .env file.
#
# Services:
#   - evolution_api   (evoapicloud/evolution-api:v2.3.7)       :8080
#   - evolution_pg    (postgres:16-alpine)                     :5432 (internal)
#   - evolution_redis (redis:7-alpine)                         :6379 (internal)

services:
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:v2.3.7
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    env_file:
      - .env
    environment:
      # ── Server ────────────────────────────────────────────────────────────
      SERVER_TYPE: http
      SERVER_PORT: 8080
      SERVER_URL: ${SERVER_URL}

      # ── Authentication ────────────────────────────────────────────────────
      AUTHENTICATION_API_KEY: ${AUTHENTICATION_API_KEY}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"

      # ── Language ──────────────────────────────────────────────────────────
      LANGUAGE: en

      # ── Logs (keep low-volume in prod) ────────────────────────────────────
      LOG_LEVEL: ERROR,WARN,INFO,LOG
      LOG_COLOR: "true"
      LOG_BAILEYS: error

      # ── Instance lifecycle ────────────────────────────────────────────────
      DEL_INSTANCE: "false"

      # ── Database (PostgreSQL via Prisma) ──────────────────────────────────
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: rozare_evolution
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_DELETE_MESSAGE: "true"

      # ── Redis cache ───────────────────────────────────────────────────────
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_TTL: "604800"
      CACHE_REDIS_PREFIX_KEY: rozare_evolution
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"

      # ── Session identification (shown in the linked-device list) ──────────
      CONFIG_SESSION_PHONE_CLIENT: Rozare
      CONFIG_SESSION_PHONE_NAME: Chrome

      # ── QR code behaviour ─────────────────────────────────────────────────
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#000000"

      # ── Disabled integrations ─────────────────────────────────────────────
      RABBITMQ_ENABLED: "false"
      SQS_ENABLED: "false"
      WEBSOCKET_ENABLED: "false"
      S3_ENABLED: "false"

      # ── Global webhook (per-instance webhook is set by the backend) ───────
      WEBHOOK_GLOBAL_ENABLED: "false"

      # ── CORS ──────────────────────────────────────────────────────────────
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET,POST,PUT,DELETE"
      CORS_CREDENTIALS: "true"

      # ── Telemetry / metrics off in prod ───────────────────────────────────
      TELEMETRY_ENABLED: "false"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  postgres:
    container_name: evolution_postgres
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - postgres
      - -c
      - max_connections=200
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --port 6379
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

volumes:
  evolution_instances:
    driver: local
  evolution_redis:
    driver: local
  postgres_data:
    driver: local

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
