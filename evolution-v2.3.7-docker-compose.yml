version: "3.8"

services:
  evolution-api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    depends_on:
      - redis
      - postgres
    ports:
      - "8080:8080"
    volumes:
      - evolution_instances:/evolution/instances
    networks:
      - evolution-net
    environment:
      # Server Configuration
      - SERVER_NAME=rozare-evolution
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=http://80.225.254.66:8080
      
      # Authentication
      - AUTHENTICATION_API_KEY=rozareplatform
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      
      # Language
      - LANGUAGE=en
      
      # Logs
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,WEBHOOKS
      - LOG_COLOR=true
      - LOG_BAILEYS=error
      
      # Instance Management
      - DEL_INSTANCE=false
      
      # Database Configuration (PostgreSQL)
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://evolution:evolution_secure_password_2024@postgres:5432/evolution?schema=evolution_api
      - DATABASE_CONNECTION_CLIENT_NAME=rozare_evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - DATABASE_SAVE_MESSAGE_UPDATE=true
      - DATABASE_SAVE_DATA_CONTACTS=true
      - DATABASE_SAVE_DATA_CHATS=true
      - DATABASE_SAVE_DATA_LABELS=true
      - DATABASE_SAVE_DATA_HISTORIC=true
      - DATABASE_DELETE_MESSAGE=true
      
      # Redis Cache
      - CACHE_REDIS_ENABLED=true
      - CACHE_REDIS_URI=redis://redis:6379/1
      - CACHE_REDIS_TTL=604800
      - CACHE_REDIS_PREFIX_KEY=rozare_evolution
      - CACHE_REDIS_SAVE_INSTANCES=false
      - CACHE_LOCAL_ENABLED=false
      
      # RabbitMQ (Disabled)
      - RABBITMQ_ENABLED=false
      
      # S3 (Disabled)
      - S3_ENABLED=false
      
      # CORS
      - CORS_ORIGIN=*
      - CORS_METHODS=GET,POST,PUT,DELETE
      - CORS_CREDENTIALS=true
      
      # Telemetry
      - TELEMETRY_ENABLED=false
      
      # Metrics
      - PROMETHEUS_METRICS=false

  redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --port 6379
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - evolution_redis:/data
    networks:
      - evolution-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    container_name: evolution_postgres
    image: postgres:16-alpine
    restart: always
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=1GB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_buffers=16MB
      - -c
      - default_statistics_target=100
      - -c
      - random_page_cost=1.1
      - -c
      - effective_io_concurrency=200
      - -c
      - work_mem=2621kB
      - -c
      - min_wal_size=1GB
      - -c
      - max_wal_size=4GB
    environment:
      - POSTGRES_DB=evolution
      - POSTGRES_USER=evolution
      - POSTGRES_PASSWORD=evolution_secure_password_2024
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - evolution-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evolution -d evolution"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  evolution_instances:
    driver: local
  evolution_redis:
    driver: local
  postgres_data:
    driver: local

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
