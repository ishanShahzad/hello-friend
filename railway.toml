[build]
builder = "NIXPACKS"

[deploy]
startCommand = "sh -c 'if [ -f Backend/package.json ]; then npm --prefix Backend start; else npm start; fi'"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["sh -c 'if [ -f Backend/package.json ]; then npm ci --prefix Backend; else npm ci; fi'"]

[phases.build]
cmds = ["echo 'Backend build complete'"]
